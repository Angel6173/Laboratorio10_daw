services:
  - type: web
    name: laboratorio9-daw-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python enrollments/manage.py collectstatic --noinput && python enrollments/manage.py migrate"
    startCommand: "gunicorn --chdir enrollments enrollments.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
